---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: rpm-build
  name: rpmbuild
  labels:
    build.appstudio.redhat.com/multi-platform-required: "true"
    build.appstudio.redhat.com/build_type: "rpm"
spec:
  description: |-
    RPM Build task.
  params:
    - description: Package name being built
      name: package-name
      type: string
    - description: The platform/architecture we build on
      name: PLATFORM
      type: string
    - description: The architecture we build for
      name: arch
      type: string
    - description: The branch name we build against/from
      name: target-branch
      type: string
    - description: Mock configuration template file (trusted-artifact, string content)
      name: mock-config-template-file
      type: string
    - description: RPM Build environment OCI image to run scripts in
      name: script-environment-image
      type: string
    - description: Build without network access
      name: hermetic
      type: string
    - description: The Trusted Artifact URI pointing to the artifact with the source and deps.
      name: dependencies-artifact
      type: string
    - description: The Trusted Artifact URI pointing to the artifact with the deps calculation.
      name: calculation-artifact
      type: string
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
    - name: ociArtifactExpiresAfter
      description: How long Trusted Artifacts should be retained
      type: string
    - name: specfile
      description: |
        Name of specfile when specfile doesn't have the same prefix name as package name.
        Default is null and package-name.spec is used.
      type: string
  results:
    - name: rpmbuild-artifact
      description: The Trusted Artifact URI pointing to the artifact with the result of the build.
      type: string
  # 'timeout: "72h"' doesn't work for task files.  Per-step timeouts work, but
  # we have to configure per-Task timeout in the Pipeline
  # file.
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
  steps:
    - name: use-trusted-artifact-source
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:a246cf2267fe6fa68ae8885c6ca4141923edca3ccf9b56838d1ebe369d31b46d
      args:
        - use
        - $(params.dependencies-artifact)=/var/workdir/source
    - name: use-trusted-artifact-results
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:a246cf2267fe6fa68ae8885c6ca4141923edca3ccf9b56838d1ebe369d31b46d
      args:
        - use
        - $(params.calculation-artifact)=/var/workdir/results
    - name: use-trusted-artifact-mock-config
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:a246cf2267fe6fa68ae8885c6ca4141923edca3ccf9b56838d1ebe369d31b46d
      args:
        - use
        - $(params.mock-config-template-file)=/var/workdir/mock-config
    - name: mock-build
      image: "quay.io/redhat-appstudio/multi-platform-runner:01c7670e81d5120347cf0ad13372742489985e5f@sha256:246adeaaba600e207131d63a7f706cffdcdc37d8f600c56187123ec62823ff44"
      script: |
        #!/bin/bash
        set -ex
        if test "$(params.PLATFORM)" = localhost; then
          # do nothing (architecture not selected)
          exit 0
        fi
        mkdir -p ~/.ssh
        if [ -e "/ssh/error" ]; then
          #no server could be provisioned
          cat /ssh/error
          exit 1
        elif [ -e "/ssh/otp" ]; then
         curl --cacert /ssh/otp-ca -XPOST -d @/ssh/otp $(cat /ssh/otp-server) >~/.ssh/id_rsa
         echo "" >> ~/.ssh/id_rsa
        else
          cp /ssh/id_rsa ~/.ssh
        fi

        chmod 0400 ~/.ssh/id_rsa
        export SSH_HOST=$(cat /ssh/host)
        export HOMEDIR=$(cat /ssh/user-dir)
        export SSH_ARGS="-o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10"
        remote_cmd() { ssh $SSH_ARGS "$SSH_HOST" "$@" ; }
        send() { rsync -e "ssh $SSH_ARGS" -rva "$1" "$SSH_HOST:$2" ; }
        receive() { rsync -e "ssh $SSH_ARGS" -rva "$SSH_HOST:$1" "$2" ; }

        if [ "$SSH_HOST" == "localhost" ] ; then
          echo "Running at local host is not supported"
          exit 1
        fi

        workdir=/var/workdir

        remote_cmd echo "Hello from the other side!"

        # Allow mockbuilder (group mock) to read sources, and write results
        remote_cmd mkdir "$HOMEDIR/results" "$HOMEDIR/source" "$HOMEDIR/var_lib_mock"
        remote_cmd podman unshare setfacl -m g:135:r-x -m default:g:135:r-x "$HOMEDIR/source"
        remote_cmd podman unshare setfacl -m g:135:rwx -m default:g:135:rwx "$HOMEDIR/results"
        remote_cmd podman unshare chgrp 135 "$HOMEDIR/var_lib_mock"
        remote_cmd podman unshare chmod g+rwx "$HOMEDIR/var_lib_mock"

        send "$workdir/source/" "$HOMEDIR/source"

        mock_img=$(params.script-environment-image)
        # podman pull has --retry=3 as a default, nevertheless it works only for download of blobs,
        # if manifest download fails it will not be applied
        for i in {1..5} ; do
            remote_cmd podman pull "$mock_img" && break
            sleep_time=$((i ** 2))
            echo "Retrying in $sleep_time seconds."
            sleep $sleep_time
        done

        # Set the PID limit. 16384 is the maximum supported value on OpenShift
        # to prevent resource exhaustion errors when building large packages like gcc.
        PID_LIMIT_CONST=16384
        podman_params=(
            -u mockbuilder
            --pids-limit=$PID_LIMIT_CONST
            -v "$HOMEDIR/source:/source"
            -v "$HOMEDIR/results:/results"
            -v "$HOMEDIR/var_lib_mock:/var/lib/mock"
            --init --privileged --rm -ti
            --security-opt label=disable "$mock_img"
        )

        if test "$(params.specfile)" != "null" ; then
          specfile_name=$(params.specfile)
        else
          specfile_prefix=$(params.package-name)
          specfile_name="${specfile_prefix}.spec"
        fi

        success=true
        if "$(params.hermetic)"; then
          # Give mockbuilder rights to consume buildroot.
          remote_cmd mkdir "$HOMEDIR/buildroot"
          remote_cmd podman unshare setfacl -m g:135:r-x -m default:g:135:r-x "$HOMEDIR/buildroot"
          send "$workdir/results/$(params.arch)/results" "$HOMEDIR/buildroot"

          remote_cmd podman run --network=none \
                                -v "$HOMEDIR/buildroot:/buildroot" \
                                "${podman_params[@]}" \
              mock --hermetic-build \
                  /buildroot/results/buildroot_lock.json \
                  /buildroot/results/buildroot_repo \
                  --spec /source/$specfile_name \
                  --sources /source --resultdir /results \
          || success=false
        else
          if [ $(params.arch) == "i686" ] ; then
            mock_arch=i386
          else
            mock_arch=$(params.arch)
          fi
          # Instantiate the given Mock config template for our architecture.
          sed "s|@ARCH@|$mock_arch|" "$workdir/mock-config/mock.cfg" > "$workdir/mock.cfg"
          send "$workdir/mock.cfg" "$HOMEDIR/mock.cfg"
          remote_cmd podman run -v "$HOMEDIR/mock.cfg:/mock.cfg" \
                                "${podman_params[@]}" \
              mock -r /mock.cfg \
                  --spec /source/$specfile_name \
                  --sources /source --resultdir /results \
          || success=false
        fi

        # Display DNF logs regardless of the Mock exit status, then propagate
        # any Mock failure to terminate the script.  Preserving the DNF logs in
        # the output allows for troubleshooting intermittent DNF errors (e.g.,
        # those with mirrored repos):
        # https://github.com/rpm-software-management/dnf5/issues/1673
        # (sync with calculate-deps.yaml)
        remote_cmd "tar xvfO '$HOMEDIR'/results/chroot_scan.tar.gz 2>&1 | cat"

        echo "DEBUG: resultdir file ownership and permissions on remote host"
        remote_cmd ls -la "$HOMEDIR/results/" || true
        remote_cmd stat -c "'%a %U:%G %n'" "$HOMEDIR/results/"'*' || true
        remote_cmd getfacl "$HOMEDIR/results/" || true

        $success

        # Ensure result files are world-readable before rsync.  Mock
        # copies RPMs to the resultdir inheriting the host's umask,
        # which on some builders is 0027 — stripping the other-read
        # bit and causing rsync Permission denied for files owned by
        # the container's subuid.
        remote_cmd podman unshare chmod -R a+rX "$HOMEDIR/results/"

        resultdir="$workdir/results/$(params.arch)"
        mkdir -p "$resultdir"
        receive "$HOMEDIR/results/" "$resultdir"

        # For non-hermetic builds, ancestors.json may not exist from
        # calculate-deps.  Generate it here using the expanded specfile
        # produced by the expand_spec mock plugin.
        if [ -f "$resultdir/results/ancestors.json" ]; then
          echo "ancestors.json already exists, skipping generation"
        elif [ ! -f "$resultdir/expanded-spec.txt" ]; then
          echo "WARNING: expanded-spec.txt not found in results, cannot generate ancestors.json" >&2
        else
          remote_cmd podman run -u mockbuilder \
                                --network=none \
                                -v "$HOMEDIR/source:/source" \
                                -v "$HOMEDIR/results:/results" \
                                --privileged --rm -ti "$mock_img" \
              gen_ancestors_from_src.py \
                  -s /source \
                  --specfile /results/expanded-spec.txt \
                  --already-expanded \
                  --forked-from "https://src.fedoraproject.org/rpms/$(params.package-name)" \
                  -o /results/ancestors.json
          mkdir -p "$resultdir/results"
          receive "$HOMEDIR/results/ancestors.json" "$resultdir/results/ancestors.json"
          cat "$resultdir/results/ancestors.json"
        fi
      volumeMounts:
        - mountPath: /ssh
          name: ssh
          readOnly: true
    - name: extract-rpms
      image: $(params.script-environment-image)
      workingDir: /var/workdir
      script: |
        #!/usr/bin/env bash

        if test "$(params.PLATFORM)" = localhost; then
          exit 0
        fi

        export PS4='+ $(date "+%Y-%m-%d %H:%M:%S") '
        set -x
        shopt -s nullglob
        workdir=$(pwd)
        mkdir -p rpm-extracted
        for rpm in results/*/*.rpm ; do
          [ -f "$rpm" ] || continue
          echo "Extracting rpm $rpm"
          rpm_fn=$(basename "$rpm")
          rpm_nvra=${rpm_fn%*.rpm}
          rpm_dir="rpm-extracted/$rpm_nvra"
          mkdir -p "$rpm_dir"
          cd "$rpm_dir"
          cp "$workdir/$rpm" .
          echo "Extracting rpm $rpm_fn to $rpm_dir"
          rpm2archive -n "$rpm_fn" | tar -xv
          rm "$rpm_fn"
          if [[ $rpm_fn == *.src.rpm ]]; then
            echo "Decompressing archives in srpm to $rpm_dir"
            for archive in *tar *.tbz2 *.tar.gz *.tar.xz *.tar.bz2 *.tar.zst *.tar.lz *.tgz *.tbz *.txz *.tlz *.tzst *.crate *.zip *.xpi *.oxt *.gem ; do
              [ -f "$archive" ] || continue
              case $archive in
                *.zip|*.xpi|*.oxt)
                  unzip -o "$archive" && rm "$archive" ;;
                *)
                  tar -vxf "$archive" && rm "$archive" ;;
              esac
            done
            echo "Decompressing done"
          fi
          cd "$workdir"
        done

        true archive explosion finished

    - name: run-syft
      image: registry.access.redhat.com/rh-syft-tech-preview/syft-rhel9:1.29.0@sha256:dc0da6b4448428e625271b542cc029ab03de92f75ea50d6d63b1d088d20bbd28
      workingDir: /var/workdir
      script: |
        #!/usr/bin/env bash
        if test "$(params.PLATFORM)" = localhost; then
          exit 0
        fi

        for rpm_dir in rpm-extracted/*; do
          [ -d "$rpm_dir" ] || continue
          rpm_nvra=$(basename "$rpm_dir")
          echo "Scanning $rpm_dir"
          syft "$rpm_dir" -o spdx-json > "results/$(params.arch)/$rpm_nvra.sbom.json"
        done
    - name: create-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:a246cf2267fe6fa68ae8885c6ca4141923edca3ccf9b56838d1ebe369d31b46d
      args:
        - create
        - --store
        - $(params.ociStorage)
        - $(results.rpmbuild-artifact.path)=/var/workdir/results
      env:
        - name: IMAGE_EXPIRES_AFTER
          value: $(params.ociArtifactExpiresAfter)
  volumes:
    - name: ssh
      secret:
        optional: false
        secretName: multi-platform-ssh-$(context.taskRun.name)
    - name: workdir
      emptyDir: {}
