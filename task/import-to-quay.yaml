---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: rpm-build
  name: import-to-quay
spec:
  description: Import built results into quay.io
  params:
    - description: Source Repository URL
      name: git-url
      type: string
    - name: revision
      description: Revision of the Source Repository
      type: string
    - name: ociStorage
      type: string
    - description: The name of the package we build
      name: package-name
      type: string
    - name: test-suffix
      type: string
      description: |
        Test-only.  If testing the pipeline, we still want to test the upload to
        quay.io, but we don't want to mix-up with the real "production" uploads.
      default: ""
    - name: start-time
      description: Store pipeline start time
      default: ""
      type: string
    - name: pipelinerun-id
      description: PipelineRun ID (namespace/name)
      default: ""
      type: string
    - description: The Trusted Artifact URI pointing to the i686 build output
      name: i686-artifact
      type: string
    - description: The Trusted Artifact URI pointing to the x86_64 build output
      name: x86_64-artifact
      type: string
    - description: The Trusted Artifact URI pointing to the aarch64 build output
      name: aarch64-artifact
      type: string
    - description: The Trusted Artifact URI pointing to the s390 build output
      name: s390-artifact
      type: string
    - description: The Trusted Artifact URI pointing to the s390x build output
      name: s390x-artifact
      type: string
    - description: The Trusted Artifact URI pointing to the ppc64le build output
      name: ppc64le-artifact
      type: string
    - description: RPM Build environment OCI image to run scripts in
      name: script-environment-image
      type: string
    - name: purl-rpm-namespace
      description: PURL namespace for RPM packages in the generated SBOM (e.g., fedora, redhat)
      type: string
      default: "fedora"
    - name: pulp-target-arch-repo
      description: Use per-architecture Pulp repositories instead of per-build repos
      type: string
      default: "false"
  results:
    - name: IMAGE_URL
      description: Location of build artifact
    - name: IMAGE_DIGEST
      description: Build artifact digest
    - name: NVR
      description: name-version-release of built package
    - name: SBOM_BLOB_URL
      description: SPDX SBOM
      type: string
    - name: PULP-IMAGE_URL
      description: Location of Pulp build artifact
    - name: PULP-IMAGE_DIGEST
      description: Pulp build artifact digest
  stepTemplate:
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /var/workdir/results
        name: workdir
  steps:
    - name: use-trusted-artifact-x86-64
      image: quay.io/konflux-ci/build-trusted-artifacts@sha256:69c9537ec111c5333ef3351e6afbe5e9ab76bc416057f2fe6675895f73c25239
      args:
        - use
        - $(params.x86_64-artifact)=/var/workdir/results
    - name: use-trusted-artifact-aarch64
      image: quay.io/konflux-ci/build-trusted-artifacts@sha256:69c9537ec111c5333ef3351e6afbe5e9ab76bc416057f2fe6675895f73c25239
      args:
        - use
        - $(params.aarch64-artifact)=/var/workdir/results
    - name: use-trusted-artifact-s390
      image: quay.io/konflux-ci/build-trusted-artifacts@sha256:470ce04569ca7219f30dfdccdd282ed4f47201b344b05c67a3497ddcd967e2b3
      args:
        - use
        - $(params.s390-artifact)=/var/workdir/results
    - name: use-trusted-artifact-s390x
      image: quay.io/konflux-ci/build-trusted-artifacts@sha256:69c9537ec111c5333ef3351e6afbe5e9ab76bc416057f2fe6675895f73c25239
      args:
        - use
        - $(params.s390x-artifact)=/var/workdir/results
    - name: use-trusted-artifact-ppc64le
      image: quay.io/konflux-ci/build-trusted-artifacts@sha256:69c9537ec111c5333ef3351e6afbe5e9ab76bc416057f2fe6675895f73c25239
      args:
        - use
        - $(params.ppc64le-artifact)=/var/workdir/results
    - name: use-trusted-artifact-i686
      image: quay.io/konflux-ci/build-trusted-artifacts@sha256:69c9537ec111c5333ef3351e6afbe5e9ab76bc416057f2fe6675895f73c25239
      args:
        - use
        - $(params.i686-artifact)=/var/workdir/results
    - name: gather-rpms
      image: $(params.script-environment-image)
      script: |
        #!/usr/bin/env bash
        set -e
        cd /var/workdir/results
        /usr/local/bin/gather_rpms.py \
            --source-url git+$(params.git-url)#$(params.revision) \
            --start-time $(params.start-time) \
            --end-time `date "+%s"` \
            --pipeline-id "$(params.pipelinerun-id)"
        echo "Gathered `ls oras-staging | wc -l` files for upload"

    - name: push-to-quay-select-auth
      image: quay.io/konflux-ci/task-runner:2.1.0@sha256:c34c933c269e2401bb042fe69e2999cf288331b6586d4f4eca9c845270d9b1f9
      script: |
        #!/usr/bin/env bash
        set -e

        cd /var/workdir/results

        # Get NVR from any SRPM
        NVR=$(<nvr.log)

        IMAGE_URL="$(params.ociStorage)"

        echo "Selecting auth for $IMAGE_URL"
        select-oci-auth $IMAGE_URL > $HOME/auth.json

        echo "Pushing to: $IMAGE_URL"
        cd oras-staging
        # TODO: rewrite to push/attach + xargs for bigger builds (texlive has ~580 rpms)
        oras push \
             --registry-config "$HOME/auth.json" \
             --artifact-type application/vnd.rpm.build.v0 \
             --annotation quay.expires-after=14d \
             $IMAGE_URL \
             `cat ../oras-push-list.txt` | tee /tmp/oras.log

        grep "Digest:" /tmp/oras.log | awk '{print $2}' | tr -d '\n' > $(results.IMAGE_DIGEST.path)
        echo -n $IMAGE_URL > $(results.IMAGE_URL.path)
        echo -n $NVR > $(results.NVR.path)
    - name: merge-syft-sbom
      image: $(params.script-environment-image)
      workingDir: /var/workdir/results/oras-staging
      script: |
        #!/bin/bash
        export PS4='+ $(date "+%Y-%m-%d %H:%M:%S") '
        set -x
        # Configure PURL RPM namespace for SBOM generation
        echo '{"purl_rpm_namespace": "$(params.purl-rpm-namespace)"}' > rpmbuild_sbom_config.json
        # list dirs
        find . | sort
        # Create empty SPDX doc as placeholder for --syft-sbom (to be removed later)
        echo '{"spdxVersion":"SPDX-2.3","packages":[],"files":[],"relationships":[]}' > syft-sbom.json
        ARGS=(--rpm-dir . --syft-sbom syft-sbom.json --sbom-merged sbom-merged.json --config rpmbuild_sbom_config.json)
        if [ -f ancestors.json ]; then
          ARGS+=(--source-data ancestors.json)
        else
          echo "WARNING: ancestors.json not found in oras-staging, skipping source artifacts in SBOM" >&2
        fi
        if [ -f buildroot_rpms.json ]; then
          ARGS+=(--buildroot-arch-list buildroot_rpms.json)
        else
          echo "WARNING: buildroot_rpms.json not found in oras-staging, skipping buildroot data in SBOM" >&2
        fi
        merge_sboms.py "${ARGS[@]}"
    - name: show-sbom
      image: quay.io/konflux-ci/task-runner:2.1.0@sha256:c34c933c269e2401bb042fe69e2999cf288331b6586d4f4eca9c845270d9b1f9
      workingDir: /var/workdir/results/oras-staging
      script: |
        #!/usr/bin/env bash
        jq . sbom-merged.json
    - name: push-to-pulp-select-auth
      image: quay.io/redhat-user-workloads/artifact-storage-tenant/tooling/pulp-tool-container:latest@sha256:583e721a97c0d24b5d71eb23e2a0dc5f1622ebacc63a9a8ab0fb702780f21bbd
      script: |
        #!/usr/bin/env bash
        set -e
        : > "$(results.PULP-IMAGE_URL.path)"
        : > "$(results.PULP-IMAGE_DIGEST.path)"

        if [ -f /pulp-access/cli.toml ]; then
          PULP_ARGS=(
            pulp-tool --config /pulp-access/cli.toml
            --build-id "$(params.pipelinerun-id)"
            --namespace "$(context.taskRun.namespace)"
            upload
            --parent-package "$(params.package-name)"
            --rpm-path "/var/workdir/results"
            --sbom-path "/var/workdir/results/oras-staging/sbom-merged.json"
            --artifact-results "$(results.PULP-IMAGE_URL.path)","$(results.PULP-IMAGE_DIGEST.path)"
          )
          if [ "$(params.pulp-target-arch-repo)" = "true" ]; then
            PULP_ARGS+=(--target-arch-repo)
          fi
          "${PULP_ARGS[@]}"
        else
          echo "Pulp config file does not exist; skipping push and writing empty Pulp result files"
        fi
      volumeMounts:
        - mountPath: /pulp-access
          readOnly: true
          name: pulp-access-credentials
    - name: upload-sbom-to-quay
      image: quay.io/konflux-ci/task-runner:2.1.0@sha256:c34c933c269e2401bb042fe69e2999cf288331b6586d4f4eca9c845270d9b1f9
      script: |
        #!/usr/bin/env bash
        cosign \
         attach sbom \
         --sbom results/oras-staging/sbom-merged.json \
         --type spdx \
         $(cat $(results.IMAGE_URL.path))@$(cat $(results.IMAGE_DIGEST.path))
      workingDir: /var/workdir
    - name: report-sbom-url
      image: quay.io/konflux-ci/task-runner:2.1.0@sha256:c34c933c269e2401bb042fe69e2999cf288331b6586d4f4eca9c845270d9b1f9
      workingDir: /var/workdir/results/oras-staging
      script: |
        #!/usr/bin/env bash
        set -e
        IMAGE_URL=$(cat $(results.IMAGE_URL.path))
        REPO=${IMAGE_URL%:*}
        echo "Found that ${REPO} is the repository for ${IMAGE_URL}"
        SBOM_DIGEST=$(sha256sum sbom-merged.json | awk '{ print $1 }')
        echo "Found that ${SBOM_DIGEST} is the SBOM digest"
        echo -n "${REPO}@sha256:${SBOM_DIGEST}" | tee $(results.SBOM_BLOB_URL.path)
  volumes:
    - name: pulp-access-credentials
      secret:
        optional: true
        secretName: pulp-access
    - name: workdir
      emptyDir: {}
