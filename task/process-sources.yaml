---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/tags: rpm-build
  name: process-sources
spec:
  description: |-
    Download source files referenced by a spec file.
  params:
    - description: Package name to clone
      name: package-name
      type: string
    - name: specfile
      description: |
        Name of specfile when specfile doesn't have the same prefix name as
        package name.  Default is null and $(params.package-name).spec is used.
      type: string
      default: "null"
    - description: The Trusted Artifact URI pointing to the artifact with the source code.
      name: source-artifact
      type: string
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
    - name: ociArtifactExpiresAfter
      description: How long Trusted Artifacts should be retained
      type: string
    - description: RPM Build environment OCI image to run scripts in
      name: script-environment-image
      type: string
    - description: Is the build hermetic?
      name: hermetic
      type: string
    - name: monorepo-subdir
      description: Subdirectory of the source directory where the spec file is located.
      type: string
    - description: List of architectures we build RPMs for
      name: build-architectures
      type: array
    - description: List of platform overrides (MPLs)
      name: build-platforms
      type: array
      default:
        - linux/arm64
        - linux/ppc64le
        - linux/s390x
        - linux/amd64
    - description: Target distribution. The pipeline expands spec file using macros from the target distribution. Typically specified as ID-VERSION_ID (see /etc/os-release), e.g., rhel-11
      name: target-distribution
      type: string
      default: 'fedora-rawhide'
    - description: |
        URL prefix of the upstream dist-git repository for lookaside cache resolution.
        The package name will be appended to this prefix.
        If not specified, defaults to https://src.fedoraproject.org/rpms/.
      name: forked-from
      type: string
      default: "https://src.fedoraproject.org/rpms/"
    - description: |
        Path to the directory containing the dist-git-client configuration.
        Passed to dist-git-client via --configdir option.
      name: dist-git-client-configdir
      type: string
      default: ""
  results:
    - name: dependencies-artifact
      description: The Trusted Artifact URI pointing to the artifact with the rpm deps and source.
      type: string
    - name: LOOKASIDE_CONFIG
      description: |
        JSON object containing the lookaside cache configuration used to download sources.
        Contains lookaside_location, uri_pattern, and package name. Consumers can use this
        with the sources file to reconstruct full download URLs for attestation verification.
      type: string
    - name: skip-mpc-tasks
      description: |
        The RPM Build Pipeline tasks depend on each other (subsequent tasks
        consume results from previous tasks).  These dependencies are
        declaratively specified, and if a task is skipped and doesn't provide
        results, the subsequent task is skipped as well.  But we need the
        Pipeline to continue.  For this reason, we don't skip tasks — instead,
        we perform a no-op ("do nothing") inside the task, if needed.

        Here's where another complication arises; the Multi-Platform Controller
        in Konflux allocates architecture-specific VMs for us, even if a task is
        effectively doing nothing.  To work around this, we use the concept of
        PLATFORM=localhost, which prevents this VM allocation.  This Tekton step
        is used to programmatically determine which MPC-dependent tasks should
        be "skipped".

        Related issues
        - https://github.com/tektoncd/pipeline/issues/3749
        - https://github.com/tektoncd/pipeline/issues/1684
        - https://github.com/tektoncd/pipeline/issues/1023
      properties:
        deps-ppc64le:
          type: string
        deps-x86_64:
          type: string
        deps-s390x:
          type: string
        deps-aarch64:
          type: string
        deps-i686:
          type: string
        build-ppc64le:
          type: string
        build-x86_64:
          type: string
        build-s390x:
          type: string
        build-aarch64:
          type: string
        build-i686:
          type: string
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
    env:
      - name: MONOREPO_SUBDIR
        value: $(params.monorepo-subdir)
  steps:
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:90a188e90bf8f33cf93016bcfdfd0a3a9e7df6ff13691f001a0ed4f014060e2e
      args:
        - use
        - $(params.source-artifact)=/var/workdir/source
    - name: download
      image: $(params.script-environment-image)
      script: |
        set -ex
        source_root="/var/workdir/source"
        cd "${source_root}/${MONOREPO_SUBDIR}"

        if test "$(params.specfile)" != "null" ; then
          specfile_name=$(params.specfile)
        else
          specfile_prefix=$(params.package-name)
          specfile_name="${specfile_prefix}.spec"
        fi

        # Configure curl's header until https://github.com/release-engineering/dist-git/issues/88 is fixed
        CURL_HOME=$(mktemp -d)
        echo 'header = "Accept-Encoding: identity"' > $CURL_HOME/.curlrc

        # Build dist-git-client arguments
        dgc_args=""
        if [ -n "$(params.dist-git-client-configdir)" ]; then
          # Configdir is relative to source root, not current working directory
          dgc_args="$dgc_args --configdir ${source_root}/$(params.dist-git-client-configdir)"
        fi
        # Ensure forked-from URL has trailing slash before appending package name
        forked_from_url="$(params.forked-from)"
        forked_from_url="${forked_from_url%/}/"
        dgc_args="$dgc_args --forked-from ${forked_from_url}$(params.package-name)"

        CURL_HOME="$CURL_HOME" dist-git-client $dgc_args sources

        # Determine lookaside config and write to result for attestation
        if [ -n "$(params.dist-git-client-configdir)" ]; then
          config_dir="${source_root}/$(params.dist-git-client-configdir)"
        else
          config_dir="/etc/dist-git-client"
        fi

        hostname=$(echo "${forked_from_url}" | sed -E 's|^https?://([^/]+).*|\1|')

        read -r lookaside_location uri_pattern < <(python3 -c "
        import configparser, glob, sys
        hostname = sys.argv[1]
        config_dir = sys.argv[2]
        for path in sorted(glob.glob(config_dir + '/*.ini')):
            cp = configparser.ConfigParser()
            cp.read(path)
            for section in cp.sections():
                hosts = cp.get(section, 'clone_hostnames', fallback='')
                if hostname in hosts:
                    loc = cp.get(section, 'lookaside_location', fallback='')
                    pat = cp.get(section, 'lookaside_uri_pattern', fallback='')
                    if loc:
                        print(loc, pat)
                        sys.exit(0)
        base = 'https://src.fedoraproject.org'
        pat = 'repo/pkgs/rpms/{name}/{filename}/{hashtype}/{hash}/{filename}'
        print(base, pat)
        " "$hostname" "$config_dir")

        jq -n \
          --arg package "$(params.package-name)" \
          --arg lookaside_location "$lookaside_location" \
          --arg uri_pattern "$uri_pattern" \
          '{package: $package,
           lookaside_location: $lookaside_location,
           uri_pattern: $uri_pattern}' \
          > "$(results.LOOKASIDE_CONFIG.path)"

        # Make sure we use norpm: https://github.com/fedora-infra/rpmautospec/pull/319
        if [ "${MONOREPO_SUBDIR:-.}" = "." ]; then
          rpmautospec process-distgit "$specfile_name" "$specfile_name"

          # Generate the patch-git-generated-log.txt and
          # patch-git-generated-commit.txt files.  These are harmless,
          # metadata-only files; although currently only the Glibc build uses
          # them, we generate them by default.
          patch-git-prepare.sh
        else
          echo "'rpmautospec process-distgit' is not supported for monorepos"
        fi

        cd "${source_root}"
        git diff

        # We remove the .git repository here to ensure that historical code does
        # not affect the output of the build.  This is critical because the user
        # has full control over later build process stages (even though in an
        # isolated environment).
        rm -r .git
    - name: select-mpc-machines-or-skip
      image: $(params.script-environment-image)
      args:
        - "$(params.build-architectures[*])"
        - "--platform-labels"
        - "$(params.build-platforms[*])"
      script: |
        #!/bin/bash
        export PS4='+ $(date "+%Y-%m-%d %H:%M:%S") '
        set -x
        working_dir="/var/workdir/source/${MONOREPO_SUBDIR}"
        cd "${working_dir}"

        if $(params.hermetic); then
          python3 /usr/local/bin/select_architectures.py "$@" --target-distribution "$(params.target-distribution)" --hermetic --results-file "$(results.skip-mpc-tasks.path)" --workdir "${working_dir}"
        else
          python3 /usr/local/bin/select_architectures.py "$@" --target-distribution "$(params.target-distribution)" --results-file "$(results.skip-mpc-tasks.path)" --workdir "${working_dir}"
        fi
    - name: create-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:90a188e90bf8f33cf93016bcfdfd0a3a9e7df6ff13691f001a0ed4f014060e2e
      args:
        - create
        - --store
        - $(params.ociStorage)
        # when dealing with monorepos, we only are interested in the sources for the spec file, not the entire monorepo.
        # therefore we need to copy the sources for the spec file to the dependencies artifact.
        - $(results.dependencies-artifact.path)=/var/workdir/source/$(params.monorepo-subdir)
      env:
        - name: IMAGE_EXPIRES_AFTER
          value: $(params.ociArtifactExpiresAfter)
  volumes:
    - name: workdir
      emptyDir: {}
